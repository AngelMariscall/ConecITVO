<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/src/css/index.css">
</head>

<body>
    <!-- Barra de navegación -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
            <div class="container">
                <a class="navbar-brand" href="#">ConecITVO</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="#info">Que es ConecITVO</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Nuestros servicios</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Tienda</a></li>
                        <!-- Botón para activar el modal de login -->
                        <li class="nav-item">
                            <button type="button" class="btn btn-outline-light" data-bs-toggle="modal"
                                data-bs-target="#loginModal">Iniciar sesión</button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Modal de Login -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
            <div class="modal-content gradient-custom text-white" style="border-radius: 1rem;">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-uppercase">Login</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body p-5 text-center">
                    <p class="text-white-50 mb-4">Por favor, ingresa tu correo y contraseña.</p>
                    <!-- Formulario de login -->
                    <form>
                        <div class="form-outline form-white mb-4">
                            <input type="email" id="typeEmailX" class="form-control form-control-lg"
                                placeholder="Correo" required />
                            <label class="form-label" for="typeEmailX">Correo</label>
                        </div>
                        <div class="form-outline form-white mb-4">
                            <input type="password" id="typePasswordX" class="form-control form-control-lg"
                                placeholder="Contraseña" required />
                            <label class="form-label" for="typePasswordX">Contraseña</label>
                        </div>
                        <p class="small mb-4"><a class="text-white-50" href="#!">¿Olvidaste tu contraseña?</a></p>
                        <button class="btn btn-outline-light btn-lg px-5" type="submit">Login</button>
                    </form>
                    <!-- Espacio para iconos o enlaces -->
                    <div class="mt-4">
                        <p class="mb-0">Síguenos en nuestras redes: <a href="#!" class="text-white-50 fw-bold">Redes
                                Sociales</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/src/js/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
