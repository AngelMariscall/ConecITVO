<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="/src/css/index.css">

</head>

<body>
    <!-- Header -->
    <header class="fixed-top d-flex align-items-center justify-content-between px-4">
        <h1 class="h5 mb-0">ConecITVO</h1>
        <div class="nav-icons d-flex justify-content-center flex-grow-1">
            <i class="bi bi-house-door"></i>
            <i class="bi bi-person-circle"></i>
            <i class="bi bi-bell"></i>
            <i class="bi bi-chat"></i>
        </div>
        <div class="dropdown">
            <a href="#" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <img src="/src/assets/image/icono perfil.png" alt="Foto de Perfil" class="rounded-circle" width="40">
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#">Configuración</a></li>
                <li><a id="logoutBtn" class="dropdown-item" href="#">Cerrar sesión</a></li>
            </ul>
        </div>
    </header>


    <!-- Sidebar estilo "cards" -->
    <aside class="sidebar px-3 pt-4"
        style="width: 280px; background-color: transparent; position: fixed; top: 80px; bottom: 0; left: 0; overflow-y: auto;">

        <!-- Perfil del usuario -->
        <div class="card mb-4 shadow-sm rounded-4 text-center border-0">
            <div class="card-body">
                <img src="/src/assets/image/icono perfil.png" class="rounded-circle mb-3" width="90"
                    alt="Foto de Perfil">
                <h5 class="card-title mb-1">Juan Pérez</h5>
                <p class="card-text text-muted" style="font-size: 0.9rem;">Ingeniería en Tic's</p>
                <a href="#editar-perfil" class="btn btn-outline-primary btn-sm w-100 mb-2">Editar Perfil</a>
                <a href="/src/pages/contribucion.html" class="btn btn-success btn-sm w-100 mb-2">Crear Contribución</a>
                <a href="#explorar" class="btn btn-primary btn-sm w-100">Explorar</a>
            </div>
        </div>

        <!-- Grupos del usuario -->
        <div class="card mb-4 shadow-sm rounded-4 border-0">
            <div class="card-body p-3">
                <div class="d-flex align-items-center mb-3">
                    <i class="bi bi-people-fill me-2 fs-5 text-primary"></i>
                    <h6 class="mb-0">Grupos</h6>
                </div>
                <ul class="list-unstyled ms-3">
                    <li class="mb-2 d-flex align-items-center">
                        <span class="me-2 rounded-1"
                            style="width: 6px; height: 16px; background-color: #ff6ec4;"></span>
                        <span>Ventas</span>
                    </li>
                    <li class="mb-2 d-flex align-items-center">
                        <span class="me-2 rounded-1"
                            style="width: 6px; height: 16px; background-color: #36a2eb;"></span>
                        <span>Marketing</span>
                    </li>
                    <li class="d-flex align-items-center">
                        <span class="me-2 rounded-1"
                            style="width: 6px; height: 16px; background-color: #4bc0c0;"></span>
                        <span>Onboarding</span>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Placeholder para más secciones -->
        <div class="card shadow-sm rounded-4 border-0">
            <div class="card-body text-center text-muted">
                <small>Más secciones próximamente</small>
            </div>
        </div>
    </aside>

    <!-- Publicaciones -->
    <main class="main-content">
        <div class="post">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-2">
                    <img src="/src/assets/image/icono perfil.png" alt="Avatar" class="rounded-circle" width="40">
                    <div>
                        <strong>BenitoAlavez</strong><br>
                        <small class="text-muted">Hace 2 horas</small>
                    </div>
                </div>
            </div>
            <hr>
            <p class="mb-3">Este es un ejemplo de publicación con texto.</p>
            <img src="https://txsplus.com/wp-content/uploads/2021/11/ORACLE.jpg.webp" alt="Publicación"
                class="img-fluid rounded-3">
            <div class="d-flex align-items-center gap-2 mt-3">
                <i class="bi bi-fire text-danger fs-4"></i>
                <input type="text" class="form-control form-control-sm" placeholder="Escribe un comentario...">
                <button class="btn btn-sm btn-primary">Comentar</button>
            </div>
        </div>

        <!-- más publicaciones -->
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/src/js/inicio.js"></script>
</body>

</html>
